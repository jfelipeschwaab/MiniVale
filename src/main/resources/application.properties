spring.application.name=demo

# Datasource - H2 em memoria (dados somem ao reiniciar a aplicacao)
spring.datasource.url=jdbc:h2:mem:minivale
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2, util para inspecionar as tabelas durante o desenvolvimento
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garante que o Hibernate crie as tabelas ANTES do data.sql rodar
spring.jpa.defer-datasource-initialization=true

jwt.secret=8f3e1a9c2b7d4f60a1e8c3b6d9f2a5e8c1b4d7f0a3e6c9b2d5f8a1c4e7b0d3f6
jwt.expiracao-access-ms=900000
